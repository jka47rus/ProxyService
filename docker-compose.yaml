version: '3.8'

services:
  proxy:
    container_name: proxy-service
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FOLDER_PATH: /app/proxy_list
      CHECK_DB_INTERVAL_MINUTES: ${CHECK_DB_INTERVAL_MINUTES}
      MIN_PROXIES_LIMIT: ${MIN_PROXIES_LIMIT}
      CHECK_FOLDER_INTERVAL_MINUTES: ${CHECK_FOLDER_INTERVAL_MINUTES}
      PROXIES_FAILED_ATTEMPTS: ${PROXIES_FAILED_ATTEMPTS}
      TIME_OF_CHECKING_PROXY_SECONDS: ${TIME_OF_CHECKING_PROXY_SECONDS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TO_EMAIL: ${TO_EMAIL}
    volumes:
      # Связываем физическую папку proxy_list на сервере с папкой внутри контейнера
      - ./proxy_list:/app/proxy_list
    networks:
      - proxy_network

networks:
  proxy_network:
    name: proxy_adapter_proxy_network
    external: true
