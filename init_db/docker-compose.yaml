version: '3.8'

services:
  postgres:
    container_name: proxy-db
    image: postgres:17
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: proxydb
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    volumes:
      - proxy_pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - proxy_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U username -d proxydb" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  proxy_pg_data:
networks:
  proxy_network:
    name: proxy_adapter_proxy_network
    external: true
